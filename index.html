<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎓 Samira — Congratulations! 🎓</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        .card {
            background: white;
            max-width: 500px;
            width: 100%;
            border-radius: 50px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .photo {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 20px;
            display: block;
            border: 5px solid #ffb347;
        }

        h1 {
            color: #e67e22;
            margin-bottom: 10px;
        }

        .message-box {
            background: #fff7f0;
            border-radius: 30px;
            padding: 20px;
            min-height: 150px;
            margin: 20px 0;
            font-size: 1rem;
            line-height: 1.5;
            color: #333;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        button {
            background: #e67e22;
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-size: 1.1rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        button:active {
            transform: scale(0.97);
        }

        .last-btn {
            background: #c0392b;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="card">
    <img src="images/82bf4432-0390-48df-8ca4-1021827832a8.jpg" alt="Samira" class="photo" id="samiraPhoto">
    
    <h1>🎓 Samira! 🎓</h1>
    <p style="color: #888;">Click the buttons below 👇</p>

    <div class="message-box" id="messageBox">
        💛 Ready to celebrate you, Samira?
    </div>

    <div class="buttons">
        <button id="btn1">🎉 POP CONFETTI 🎉</button>
        <button id="btn2">🎈 BALLOON PARTY 🎈</button>
        <button id="btn3">⭐ SHOWER OF STARS ⭐</button>
        <button id="lastBtn" class="last-btn">💖 QALBIGAYGA FIIRI 💖</button>
    </div>
</div>

<script>
    const messageBox = document.getElementById('messageBox');
    const photo = document.getElementById('samiraPhoto');

    // Helper: floating emojis
    function floatEmoji(emoji, count = 20) {
        for (let i = 0; i < count; i++) {
            let e = document.createElement('div');
            e.innerText = emoji;
            e.style.position = 'fixed';
            e.style.left = Math.random() * window.innerWidth + 'px';
            e.style.bottom = '0px';
            e.style.fontSize = (20 + Math.random() * 30) + 'px';
            e.style.pointerEvents = 'none';
            e.style.zIndex = '9999';
            e.style.animation = 'floatUp 2s ease-out forwards';
            e.style.userSelect = 'none';
            document.body.appendChild(e);
            setTimeout(() => e.remove(), 2000);
        }
    }

    // Add animation style if not exists
    if (!document.querySelector('#floatStyle')) {
        let style = document.createElement('style');
        style.id = 'floatStyle';
        style.textContent = `
            @keyframes floatUp {
                0% { opacity: 1; transform: translateY(0) rotate(0deg); }
                100% { opacity: 0; transform: translateY(-300px) rotate(360deg); }
            }
        `;
        document.head.appendChild(style);
    }

    // Button 1: Confetti
    document.getElementById('btn1').onclick = () => {
        floatEmoji('🎉', 30);
        floatEmoji('🎓', 20);
        messageBox.innerHTML = '🎉✨ CONFETTI EXPLOSION! ✨🎉<br><br>You deserve this joy, Samira!';
    };

    // Button 2: Balloons
    document.getElementById('btn2').onclick = () => {
        floatEmoji('🎈', 35);
        messageBox.innerHTML = '🎈🎈 HAPPY BALLOONS FLYING HIGH! 🎈🎈<br><br>Just like your dreams, Samira!';
    };

    // Button 3: Stars
    document.getElementById('btn3').onclick = () => {
        floatEmoji('⭐', 25);
        floatEmoji('🌟', 20);
        messageBox.innerHTML = '⭐⭐⭐ A SKY FULL OF STARS FOR YOU! ⭐⭐⭐<br><br>You shine so bright, Samira!';
    };

    // LAST BUTTON: Emotional message from the heart
    document.getElementById('lastBtn').onclick = () => {
        floatEmoji('💖', 40);
        floatEmoji('🤗', 20);
        floatEmoji('🎓', 25);
        
        messageBox.innerHTML = `
            💖💖💖 <strong>SAMIRA...</strong> 💖💖💖<br><br>
            From the bottom of my heart — congratulations.<br><br>
            You worked so hard. You never gave up. And now?<br><br>
            <strong>You're a GRADUATE! 🎓</strong><br><br>
           💖 Samiira... 💖

Runtii ma aqaan ereyada ugu habboon ee aan maanta kudhihi karo

Waxaan ogahay oo keliya in guushan aad gaadhay aysan si fudud ku iman.

Waxay ka timid dadaalkaagii, samirkaagii, iyo maalmo badan oo aad naftaada ku riixaysay inaad sii waddo safarkaaga.

Maanta markaan ku arko adigoo qalin-jabiyay, waxaan dareemayaa farxad dhab ah.



✨ Guushan maanta ma aha dhammaadka jidkaaga, waa bilowga waxyaabo ka sii qurux badan.

Hambalyo Samiira.

Qof kasta ma gaadho halkii uu ku hammin jiray, laakiin maanta waxaad caddaysay inaad tahay qof aan ka quusan riyadiisa. ❤️🌹
”</em> ✨<br>
            💛 MORE HAPPENS baan kuu rajaynayaa💛
        `;
    };

    // If photo doesn't load, show a fallback
    photo.onerror = () => {
        photo.src = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle fill='%23ffd966' cx='50' cy='50' r='45'/%3E%3Ctext x='50' y='67' font-size='40' text-anchor='middle' fill='%238b5a2b'%3E🎓%3C/text%3E%3C/svg%3E";
    };
</script>

</body>
</html>
